# #######################################################################################
# HYPRLAND CONFIGURATION
# #######################################################################################

# --- MONITORS ---
monitor=,preferred,auto,auto

# --- PROGRAMS ---
$terminal = alacritty
$browser  = brave
$editor   = nvim
$files    = nautilus
$menu     = rofi -show drun -show-icons

# --- AUTOSTART ---
exec-once = waybar
exec-once = mako
exec-once = swww-daemon
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# --- ENVIRONMENT VARIABLES ---
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# --- LOOK AND FEEL ---
general {
    gaps_in             = 5
    gaps_out            = 10
    border_size         = 1
    col.active_border   = rgba(ffffffcc)
    col.inactive_border = rgba(3a3a3aaa)
    layout              = dwindle
    allow_tearing       = false
}

decoration {
    rounding         = 10
    active_opacity   = 1.0
    inactive_opacity = 0.92
    drop_shadow      = true
    shadow_range     = 8
    shadow_render_power = 3
    col.shadow       = rgba(00000088)

    blur {
        enabled   = true
        size      = 6
        passes    = 2
        vibrancy  = 0.1696
        noise     = 0.02
        contrast  = 1.0
        brightness = 1.0
    }
}

animations {
    enabled = true

    # Sleek, modern animations
    bezier = fluent_decel, 0, 0.2, 0.4, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutCubic, 0.215, 0.61, 0.355, 1
    bezier = easeinoutsine, 0.37, 0, 0.63, 1

    animation = windows, 1, 3, fluent_decel, popin 60%
    animation = windowsIn, 1, 3, fluent_decel, popin 60%
    animation = windowsOut, 1, 2.5, fluent_decel, popin 60%
    animation = windowsMove, 1, 3, easeOutCubic, slide
    animation = border, 1, 4, default
    animation = fade, 1, 2.5, easeinoutsine
    animation = workspaces, 1, 4, fluent_decel, slidevert
}

dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    animate_manual_resizes  = true
    enable_swallow          = true
    swallow_regex           = ^(alacritty)$
}

# --- INPUT ---
input {
    kb_layout  = us
    follow_mouse = 1
    sensitivity  = 0
    touchpad {
        natural_scroll    = false
        tap-to-click      = true
        drag_lock         = true
    }
}

gestures {
    workspace_swipe       = true
    workspace_swipe_distance = 300
    workspace_swipe_invert   = true
    workspace_swipe_min_speed_to_force = 30
}

# #######################################################################################
# KEYBINDINGS
# #######################################################################################

$mainMod = SUPER

# --- APPLICATION LAUNCHERS ---
bind = $mainMod,         Return, exec, $terminal
bind = $mainMod,         B,      exec, $browser
bind = $mainMod,         E,      exec, $files
bind = $mainMod,         grave,  exec, $menu

# --- SETTINGS / MENUS ---
bind = $mainMod SHIFT,   S,      exec, ~/.config/scripts/settings.sh

# --- QUICK LAUNCH (ALT + number) ---
bind = ALT, 1, exec, brave
bind = ALT, 2, exec, alacritty
bind = ALT, 3, exec, nautilus

# --- WINDOW MANAGEMENT ---
bind = $mainMod,         Q,      killactive,
bind = $mainMod,         V,      togglefloating,
bind = $mainMod,         F,      fullscreen, 0
bind = $mainMod SHIFT,   F,      fullscreen, 1        # maximize (no gaps)
bind = $mainMod,         J,      togglesplit,
bind = $mainMod,         I,      swapsplit,

# --- FOCUS MOVEMENT ---
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, H,     movefocus, l
bind = $mainMod, L,     movefocus, r
bind = $mainMod, K,     movefocus, u
bind = $mainMod, J,     movefocus, d

# --- WINDOW RESIZE ---
bind = $mainMod SHIFT, left,  resizeactive, -40 0
bind = $mainMod SHIFT, right, resizeactive, 40 0
bind = $mainMod SHIFT, up,    resizeactive, 0 -40
bind = $mainMod SHIFT, down,  resizeactive, 0 40

# --- WORKSPACE SWITCHING (SUPER + 1..9/0) ---
# Hyprland workspaces are dynamic by default — workspaces are created on first use
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# --- MOVE WINDOW TO WORKSPACE (ALT + q,w,e,r,t,y → workspaces 1–6) ---
bind = ALT, q, movetoworkspace, 1
bind = ALT, w, movetoworkspace, 2
bind = ALT, e, movetoworkspace, 3
bind = ALT, r, movetoworkspace, 4
bind = ALT, t, movetoworkspace, 5
bind = ALT, y, movetoworkspace, 6

# --- MOVE TO NEXT/PREV WORKSPACE ---
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1
bind = $mainMod, Tab,        workspace, e+1
bind = $mainMod SHIFT, Tab,  workspace, e-1

# --- SCRATCHPAD ---
bind = $mainMod,        M, togglespecialworkspace, magic
bind = $mainMod SHIFT,  M, movetoworkspace, special:magic

# --- SCREENSHOTS ---
bind = ,      Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

# --- MOUSE BINDS ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
