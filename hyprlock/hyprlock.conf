background {
    monitor =
    path = screenshot
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 2
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(255, 255, 255, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(200, 200, 200)
    fade_on_empty = true
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 0.8)
    font_size = 64
    font_family = DejaVu Sans
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[echo "$(date +'%A, %d %B')"]
    color = rgba(255, 255, 255, 0.6)
    font_size = 24
    font_family = DejaVu Sans
    position = 0, 10
    halign = center
    valign = center
}
